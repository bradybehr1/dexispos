<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0c0d0e] text-[#e2e4e6]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Store POS Node</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Store POS">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        jmd: {
                            black: '#0c0d0e',
                            surface: '#141619',
                            card: '#1c1f24',
                            border: '#2a2e35',
                            blue: '#0070f3'
                        } 
                    } 
                } 
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * { -webkit-user-select: none; user-select: none; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        input, textarea, select { -webkit-user-select: text !important; user-select: text !important; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0c0d0e; }
        ::-webkit-scrollbar-thumb { background: #2a2e35; border-radius: 2px; }
        .jmd-btn-active:active { transform: scale(0.97); background-color: #2a2e35 !important; }
    </style>
</head>
<body class="h-full overflow-hidden antialiased bg-[#0c0d0e]">

    <div id="global-toast" class="fixed top-4 right-4 z-[9999] transform translate-y-20 opacity-0 pointer-events-none transition-all duration-200 flex items-center p-3 rounded-lg shadow-xl border bg-[#141619] border-[#2a2e35] max-w-xs">
        <div id="toast-icon" class="flex-shrink-0 w-5 h-5 rounded flex items-center justify-center text-white mr-2 text-xs"></div>
        <div><p id="toast-msg" class="text-xs font-bold font-mono text-slate-300"></p></div>
    </div>

    <div id="root-app" class="h-full flex flex-col"></div>

    <script type="module">
        import { initialProducts, initialEmployees, initialCustomers } from './database.js';
        import { RegisterModule } from './modules/register.js';
        import { CustomersModule } from './modules/customers.js';
        import { InventoryModule } from './modules/inventory.js';
        import { EmployeesModule } from './modules/employees.js';
        import { ReportingModule } from './modules/reporting.js';
        import { SettingsModule } from './modules/settings.js';

        class DatabaseEngine {
            constructor() { this.init(); }
            init() {
                if (localStorage.getItem("pos_products")) return;
                localStorage.setItem("pos_products", JSON.stringify(initialProducts));
                localStorage.setItem("pos_employees", JSON.stringify(initialEmployees));
                localStorage.setItem("pos_customers", JSON.stringify(initialCustomers));
                localStorage.setItem("pos_timecards", JSON.stringify([]));
                localStorage.setItem("pos_transactions", JSON.stringify([]));
                localStorage.setItem("pos_settings", JSON.stringify({
                    storeName: "Terminal Node 01",
                    taxRate: 7.00,
                    currencySymbol: "$",
                    receiptFooter: "Thank you for shopping.",
                    companyName: "",
                    taxId: "",
                    storeAddress: ""
                }));
            }
            get(key) { return JSON.parse(localStorage.getItem("pos_" + key)); }
            set(key, data) { localStorage.setItem("pos_" + key, JSON.stringify(data)); }
        }

        const db = new DatabaseEngine();

        class StateRouter {
            constructor() {
                this.currentUser = null;
                this.currentView = "register";
                this.currentPinInput = "";
                this.globalSettings = db.get("settings") || { storeName: "Terminal Node 01", currencySymbol: "$", taxRate: 7.00, receiptFooter: "" };
                
                this.modules = {
                    register: new RegisterModule(db, this),
                    customers: new CustomersModule(db, this),
                    inventory: new InventoryModule(db, this),
                    employees: new EmployeesModule(db, this),
                    reporting: new ReportingModule(db, this),
                    settings: new SettingsModule(db, this)
                };
            }

            setView(viewName) {
                if (!this.currentUser && viewName !== "login") return;
                this.currentView = viewName;
                this.render();
                if (this.modules[viewName] && typeof this.modules[viewName].onMount === 'function') {
                    this.modules[viewName].onMount();
                }
            }

            showToast(msg, type = "success") {
                const toast = document.getElementById("global-toast");
                const icon = document.getElementById("toast-icon");
                const text = document.getElementById("toast-msg");
                text.innerText = msg;
                if (type === "success") {
                    icon.className = "w-5 h-5 rounded flex items-center justify-center text-white mr-2 bg-blue-600";
                    icon.innerHTML = '<i class="fas fa-check"></i>';
                } else {
                    icon.className = "w-5 h-5 rounded flex items-center justify-center text-white mr-2 bg-orange-600";
                    icon.innerHTML = '<i class="fas fa-exclamation"></i>';
                }
                toast.classList.remove("translate-y-20", "opacity-0", "pointer-events-none");
                setTimeout(() => toast.classList.add("translate-y-20", "opacity-0", "pointer-events-none"), 2500);
            }

            pressKey(num) {
                if (this.currentPinInput.length >= 8) return;
                this.currentPinInput += num;
                this.updatePinDisplay();
            }

            clearKey() {
                this.currentPinInput = "";
                this.updatePinDisplay();
            }

            updatePinDisplay() {
                const el = document.getElementById("pin-mask-field");
                if (el) el.value = "•".repeat(this.currentPinInput.length);
            }

            submitLogin() {
                const employees = db.get("employees");
                const match = employees.find(e => e.pin === this.currentPinInput);
                if (match) {
                    this.currentUser = match;
                    this.setView("register");
                    this.showToast(`Operator: ${match.name}`);
                } else {
                    this.showToast("Access Denied", "danger");
                    this.clearKey();
                }
            }

            logout() {
                this.currentUser = null;
                this.currentPinInput = "";
                this.setView("login");
            }

            toggleClock() {
                const timecards = db.get("timecards");
                const openCardIndex = timecards.findIndex(tc => tc.employeeId === this.currentUser.id && !tc.clockOut);
                const now = new Date().toISOString();

                if (openCardIndex !== -1) {
                    timecards[openCardIndex].clockOut = now;
                    db.set("timecards", timecards);
                    this.showToast("Shift Log Out Recorded.");
                } else {
                    timecards.push({ id: "TC-" + Date.now(), employeeId: this.currentUser.id, employeeName: this.currentUser.name, clockIn: now, clockOut: null, approved: false });
                    db.set("timecards", timecards);
                    this.showToast("Shift Log In Recorded.");
                }
                this.render();
            }

            render() {
                const container = document.getElementById("root-app");
                if (!this.currentUser) {
                    container.innerHTML = this.templateLogin();
                    return;
                }

                // Protect dynamic settings retrieval values against instantiation lag loops
                this.globalSettings = db.get("settings") || { storeName: "Terminal Node 01", currencySymbol: "$", taxRate: 7.00, receiptFooter: "" };

                container.innerHTML = `
                    <header class="h-12 bg-[#141619] border-b border-[#2a2e35] px-4 flex items-center justify-between z-20 flex-shrink-0 text-xs font-bold">
                        <div class="flex items-center gap-6">
                            <div class="flex items-center gap-2 text-white">
                                <div class="w-4 h-4 rounded bg-blue-600 flex items-center justify-center font-black text-[10px]">E</div>
                                <span class="tracking-wider uppercase font-mono text-slate-300">${this.globalSettings.storeName || 'Terminal Node'}</span>
                            </div>
                            <div class="hidden sm:flex items-center gap-4 text-[#8a94a6] font-mono text-[11px] border-l border-[#2a2e35] pl-4">
                                <span>TERM: <strong class="text-slate-300">001</strong></span>
                                <span>OP: <strong class="text-blue-400 uppercase">${this.currentUser.name}</strong></span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4 font-mono text-[11px]">
                            <div class="flex items-center gap-2 bg-[#0c0d0e] border border-[#2a2e35] px-3 py-1 rounded">
                                <div class="w-1.5 h-1.5 rounded-full ${db.get("timecards").some(t => t.employeeId === this.currentUser.id && !t.clockOut) ? 'bg-emerald-500' : 'bg-slate-600'}"></div>
                                <button onclick="window.state.toggleClock()" class="text-slate-400 hover:text-white transition">
                                    ${db.get("timecards").some(t => t.employeeId === this.currentUser.id && !t.clockOut) ? 'SHIFT OUT' : 'SHIFT IN'}
                                </button>
                            </div>
                            <span class="text-slate-400" id="live-clock"></span>
                        </div>
                    </header>

                    <div class="flex-1 flex overflow-hidden">
                        <nav class="w-16 md:w-56 bg-[#141619] border-r border-[#2a2e35] flex flex-col justify-between z-10 flex-shrink-0">
                            <div class="p-2 space-y-1">
                                ${this.navItem("register", "fa-cash-register", "Sales Terminal")}
                                ${this.navItem("inventory", "fa-boxes-stacked", "Inventory Engine")}
                                ${this.navItem("customers", "fa-users", "CRM Accounts")}
                                ${this.currentUser.role !== 'Cashier' ? this.navItem("employees", "fa-id-card", "Workforce Auditing") : ''}
                                ${this.currentUser.role !== 'Cashier' ? this.navItem("reporting", "fa-chart-pie", "Analytics Ledgers") : ''}
                                ${this.currentUser.role === 'Admin' ? this.navItem("settings", "fa-sliders", "System Settings") : ''}
                            </div>
                            <div class="p-2 border-t border-[#2a2e35]">
                                <button onclick="window.state.logout()" class="w-full flex items-center justify-center gap-2 py-3 rounded text-xs font-bold uppercase tracking-wider bg-orange-950/20 text-orange-400 border border-orange-900/40 hover:bg-orange-950/40 transition">
                                    <i class="fas fa-power-off"></i><span class="hidden md:inline ml-1">Lock Node</span>
                                </button>
                            </div>
                        </nav>
                        <main class="flex-1 bg-[#0c0d0e] overflow-hidden relative" id="module-viewport-hook">
                            ${this.modules[this.currentView] ? this.modules[this.currentView].render() : ''}
                        </main>
                    </div>
                `;
                this.updateLiveClock();
            }

            navItem(view, icon, label) {
                const active = this.currentView === view;
                return `
                    <button onclick="window.state.setView('${view}')" class="w-full flex items-center gap-3 px-3 py-3 md:py-2.5 rounded text-xs font-bold uppercase font-mono tracking-wider transition ${active ? 'bg-blue-600 text-white border border-blue-500' : 'text-slate-400 hover:bg-[#1c1f24] hover:text-slate-200'}">
                        <i class="fas ${icon} text-sm w-4 text-center"></i><span class="hidden md:inline">${label}</span>
                    </button>
                `;
            }

            updateLiveClock() {
                const el = document.getElementById("live-clock");
                if (el) el.innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            }

            templateLogin() {
                return `
                    <div class="h-full flex bg-[#0c0d0e] justify-center items-center p-4">
                        <div class="w-full max-w-sm space-y-4">
                            <div class="text-center font-mono">
                                <div class="inline-block px-3 py-1 bg-[#141619] border border-[#2a2e35] rounded text-[11px] font-black tracking-widest text-blue-500 uppercase mb-2">Terminal Locked</div>
                                <h2 class="text-xl font-bold tracking-tight text-white uppercase">Operator Access Gateway</h2>
                            </div>
                            <div class="bg-[#141619] border border-[#2a2e35] p-5 rounded shadow-2xl space-y-4">
                                <div class="w-full bg-[#0c0d0e] border border-[#2a2e35] rounded p-3 text-center">
                                    <input type="text" id="pin-mask-field" readonly placeholder="ENTER PIN ACCESS" class="bg-transparent border-none text-center text-xl font-mono font-bold tracking-widest text-blue-400 w-full outline-none placeholder-[#2a2e35]">
                                </div>
                                <div class="grid grid-cols-3 gap-2">
                                    ${['1','2','3','4','5','6','7','8','9'].map(n => `<button onclick="window.state.pressKey('${n}')" class="h-14 rounded bg-[#1c1f24] text-white font-mono font-bold text-lg border border-[#2a2e35] jmd-btn-active transition flex items-center justify-center">${n}</button>`).join('')}
                                    <button onclick="window.state.clearKey()" class="h-14 rounded bg-[#1c1f24] text-orange-400 font-mono font-bold text-xs border border-[#2a2e35] jmd-btn-active transition uppercase tracking-wider">Clear</button>
                                    <button onclick="window.state.pressKey('0')" class="h-14 rounded bg-[#1c1f24] text-white font-mono font-bold text-lg border border-[#2a2e35] jmd-btn-active transition flex items-center justify-center">0</button>
                                    <button onclick="window.state.submitLogin()" class="h-14 rounded bg-blue-600 text-white font-mono font-bold text-xs border border-blue-500 transition uppercase tracking-wider">Unlock</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        const state = new StateRouter();
        window.state = state; 
        state.render();
        setInterval(() => state.updateLiveClock(), 1000);
    </script>
</body>
</html>
