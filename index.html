<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-900 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aegis POS Enterprise</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aegis POS">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#030712',
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        input, textarea, select {
            -webkit-user-select: text !important;
            user-select: text !important;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="h-full overflow-hidden font-sans antialiased">

    <div id="global-toast" class="fixed top-6 right-6 z-50 transform translate-y-20 opacity-0 pointer-events-none transition-all duration-300 flex items-center p-4 rounded-xl shadow-2xl border bg-slate-800 border-slate-700 max-w-sm">
        <div id="toast-icon" class="flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-white mr-3"></div>
        <div>
            <p id="toast-msg" class="text-sm font-semibold text-slate-200"></p>
        </div>
    </div>

    <div id="root-app" class="h-full flex flex-col"></div>

    <script>
        //------------------------------------------------------------------------
        // DATA MODELS, PERSISTENCE ENGINE & RECONCILIATION SEEDING
        //------------------------------------------------------------------------
        const DEFAULT_PRODUCTS = [
            { id: "p1", name: "Premium Tier Gift Box", sku: "88811101", price: 45.00, cost: 18.50, stock: 59, category: "Gifts" },
            { id: "p2", name: "Standard Luxury Pack A", sku: "88811102", price: 25.00, cost: 11.00, stock: 112, category: "Bundles" },
            { id: "p3", name: "Standard Fragrance Pack B", sku: "88811103", price: 15.00, cost: 6.25, stock: 84, category: "Fragrance" },
            { id: "p4", name: "Essential Aromatherapy Upgrade", sku: "88811104", price: 10.00, cost: 3.10, stock: 240, category: "Upgrades" },
            { id: "p5", name: "Elegance Collection Kit", sku: "88811105", price: 30.00, cost: 12.00, stock: 45, category: "Bundles" },
            { id: "p6", name: "Custom Counter Top Display Svc", sku: "88811106", price: 65.00, cost: 0.00, stock: 999, category: "Services" },
            { id: "p7", name: "Mini Sample Gift Tray", sku: "88811107", price: 5.50, cost: 1.75, stock: 14, category: "Gifts" },
            { id: "p8", name: "Deluxe Executive Streetwear Trunk", sku: "88811108", price: 85.00, cost: 39.00, stock: 32, category: "Gifts" }
        ];

        const DEFAULT_EMPLOYEES = [
            { id: "e1", name: "Brady Behrendt", pin: "9091237", role: "Admin", wage: 34.50 },
            { id: "e2", name: "Eduardo Sanchez", pin: "1111", role: "Manager", wage: 26.00 },
            { id: "e3", name: "Alex Mercer", pin: "2222", role: "Cashier", wage: 16.50 }
        ];

        const DEFAULT_CUSTOMERS = [
            { id: "c1", name: "John Miller", phone: "3205550192", email: "jmiller@gmail.com", spend: 340.50, points: 120 },
            { id: "c2", name: "Sarah Jenkins", phone: "6125559843", email: "sjenkins@yahoo.com", spend: 1250.00, points: 450 },
            { id: "c3", name: "Marcus Brody", phone: "7635552311", email: "mbrody@outlook.com", spend: 45.50, points: 15 }
        ];

        class DatabaseEngine {
            constructor() { this.init(); }
            init() { if (!localStorage.getItem("pos_initialized")) { this.seed(); } }
            seed() {
                localStorage.setItem("pos_products", JSON.stringify(DEFAULT_PRODUCTS));
                localStorage.setItem("pos_employees", JSON.stringify(DEFAULT_EMPLOYEES));
                localStorage.setItem("pos_customers", JSON.stringify(DEFAULT_CUSTOMERS));
                localStorage.setItem("pos_timecards", JSON.stringify([]));
                
                const txHistory = [];
                const baseDate = new Date();
                for (let i = 30; i >= 0; i--) {
                    const txDate = new Date(baseDate.getTime() - (i * 24 * 60 * 60 * 1000));
                    const dayVolume = Math.floor(Math.random() * 8) + 3; 
                    for (let j = 0; j < dayVolume; j++) {
                        const prod = DEFAULT_PRODUCTS[Math.floor(Math.random() * DEFAULT_PRODUCTS.length)];
                        const emp = DEFAULT_EMPLOYEES[Math.floor(Math.random() * DEFAULT_EMPLOYEES.length)];
                        const cust = DEFAULT_CUSTOMERS[Math.floor(Math.random() * DEFAULT_CUSTOMERS.length)];
                        const qty = Math.floor(Math.random() * 2) + 1;
                        const subtotal = prod.price * qty;
                        const tax = subtotal * 0.07;
                        const total = subtotal + tax;

                        txHistory.push({
                            id: "TX-" + Math.floor(100000 + Math.random() * 900000),
                            timestamp: txDate.toISOString(),
                            employeeId: emp.id,
                            employeeName: emp.name,
                            customerId: cust.id,
                            customerName: cust.name,
                            items: [{ id: prod.id, name: prod.name, price: prod.price, quantity: qty, discount: 0 }],
                            subtotal: subtotal,
                            tax: tax,
                            total: total,
                            paymentMethod: Math.random() > 0.3 ? "Card (Auth: 4821)" : "Cash"
                        });
                    }
                }
                localStorage.setItem("pos_transactions", JSON.stringify(txHistory));
                localStorage.setItem("pos_settings", JSON.stringify({
                    storeName: "Aegis OS Terminal",
                    taxRate: 7.00,
                    currencySymbol: "$",
                    receiptFooter: "Thank you for shopping at Aegis Retail Network."
                }));
                localStorage.setItem("pos_initialized", "true");
            }
            get(key) { return JSON.parse(localStorage.getItem("pos_" + key)); }
            set(key, data) { localStorage.setItem("pos_" + key, JSON.stringify(data)); }
        }

        const db = new DatabaseEngine();

        //------------------------------------------------------------------------
        // STATE ENGINE SYSTEM CONTROLLER
        //------------------------------------------------------------------------
        class StateMachine {
            constructor() {
                this.currentUser = null;
                this.currentView = "register"; 
                this.cart = [];
                this.selectedCustomer = null;
                this.globalSettings = db.get("settings");
                this.searchQuery = "";
                this.currentCategory = "All";
                this.html5QrScanner = null;
                this.checkoutModalOpen = false;
                this.receiptModalOpen = false;
                this.lastTransaction = null;
            }

            setView(viewName) {
                if (!this.currentUser && viewName !== "login") return;
                this.currentView = viewName;
                this.render();
                if (viewName === "reporting") { this.initReportingCharts(); }
            }

            showToast(msg, type = "success") {
                const toast = document.getElementById("global-toast");
                const icon = document.getElementById("toast-icon");
                const text = document.getElementById("toast-msg");
                
                text.innerText = msg;
                if (type === "success") {
                    icon.className = "flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-white mr-3 bg-emerald-500";
                    icon.innerHTML = '<i class="fas fa-check-circle"></i>';
                } else if (type === "danger") {
                    icon.className = "flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-white mr-3 bg-rose-500";
                    icon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
                } else {
                    icon.className = "flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-white mr-3 bg-blue-500";
                    icon.innerHTML = '<i class="fas fa-info-circle"></i>';
                }
                
                toast.classList.remove("translate-y-20", "opacity-0", "pointer-events-none");
                setTimeout(() => { toast.classList.add("translate-y-20", "opacity-0", "pointer-events-none"); }, 3000);
            }

            login(pin) {
                const employees = db.get("employees");
                const match = employees.find(e => e.pin === pin);
                if (match) {
                    this.currentUser = match;
                    this.setView("register");
                    this.showToast(`Authorized: Welcome ${match.name}`);
                } else {
                    this.showToast("Invalid Credentials PIN", "danger");
                }
            }

            logout() {
                this.currentUser = null;
                this.setView("login");
                this.showToast("Session disconnected.");
            }

            toggleClock() {
                const timecards = db.get("timecards");
                const openCardIndex = timecards.findIndex(tc => tc.employeeId === this.currentUser.id && !tc.clockOut);
                const now = new Date().toISOString();

                if (openCardIndex !== -1) {
                    timecards[openCardIndex].clockOut = now;
                    db.set("timecards", timecards);
                    this.showToast("Clock Out logged successfully.");
                } else {
                    timecards.push({
                        id: "TC-" + Date.now(),
                        employeeId: this.currentUser.id,
                        employeeName: this.currentUser.name,
                        clockIn: now,
                        clockOut: null,
                        approved: false
                    });
                    db.set("timecards", timecards);
                    this.showToast("Clock In logged successfully.");
                }
                this.render();
            }

            //------------------------------------------------------------------------
            // TRANSACTION REGISTRATION HOOKS
            //------------------------------------------------------------------------
            addToCart(productId) {
                const products = db.get("products");
                const item = products.find(p => p.id === productId);
                if (!item) return;
                if (item.stock <= 0) {
                    this.showToast("Item out of stock!", "danger");
                    return;
                }
                const existing = this.cart.find(c => c.id === productId);
                if (existing) {
                    if (existing.quantity >= item.stock) {
                        this.showToast("Cannot exceed physical stock inventory.", "danger");
                        return;
                    }
                    existing.quantity++;
                } else {
                    this.cart.push({ ...item, quantity: 1, discount: 0 });
                }
                this.render();
            }

            updateCartQty(productId, qty) {
                const products = db.get("products");
                const targetProd = products.find(p => p.id === productId);
                const item = this.cart.find(c => c.id === productId);
                if (!item) return;

                if (qty <= 0) {
                    this.cart = this.cart.filter(c => c.id !== productId);
                } else {
                    if (qty > targetProd.stock) {
                        this.showToast("Insufficient stock allocation.", "danger");
                        return;
                    }
                    item.quantity = qty;
                }
                this.render();
            }

            applyLineDiscount(productId, amt) {
                const item = this.cart.find(c => c.id === productId);
                if (!item) return;
                item.discount = Math.max(0, parseFloat(amt) || 0);
                this.render();
            }

            attachCustomer(phoneOrName) {
                const customers = db.get("customers");
                const match = customers.find(c => c.phone === phoneOrName || c.name.toLowerCase().includes(phoneOrName.toLowerCase()));
                if (match) {
                    this.selectedCustomer = match;
                    this.showToast(`Customer connected: ${match.name}`);
                } else {
                    this.showToast("No consumer profile record matched.", "danger");
                }
                this.render();
            }

            detachCustomer() {
                this.selectedCustomer = null;
                this.render();
            }

            getTotals() {
                let subtotal = 0;
                this.cart.forEach(c => { subtotal += (c.price * c.quantity) - c.discount; });
                const tax = subtotal * (parseFloat(this.globalSettings.taxRate) / 100);
                const total = subtotal + tax;
                return { subtotal, tax, total };
            }

            processCheckout(paymentMethod) {
                const { subtotal, tax, total } = this.getTotals();
                if (this.cart.length === 0) return;

                let methodString = paymentMethod;

                // 4-DIGIT CARD CARD SEGMENTATION PROMPT INTERCEPT HOOK
                if (paymentMethod === "Card") {
                    let lastFour = "";
                    let isValid = false;
                    
                    while (!isValid) {
                        const input = prompt("Swipe/Insert Card. Enter the last 4 digits of card number to authorize transaction:");
                        if (input === null) {
                            this.showToast("Card processing canceled.", "info");
                            return;
                        }
                        if (/^\d{4}$/.test(input.trim())) {
                            lastFour = input.trim();
                            isValid = true;
                        } else {
                            alert("Invalid input parameters. Must enter exactly 4 numbers.");
                        }
                    }
                    methodString = `Card (Last 4: ${lastFour})`;
                }

                if (paymentMethod === "Rewards") {
                    if (!this.selectedCustomer || this.selectedCustomer.points < Math.floor(total * 10)) {
                        this.showToast("Insufficient loyalty rewards matrix balance.", "danger");
                        return;
                    }
                }

                const products = db.get("products");
                this.cart.forEach(c => {
                    const p = products.find(prod => prod.id === c.id);
                    if (p) p.stock = Math.max(0, p.stock - c.quantity);
                });
                db.set("products", products);

                const customers = db.get("customers");
                if (this.selectedCustomer) {
                    const cMatch = customers.find(cust => cust.id === this.selectedCustomer.id);
                    if (cMatch) {
                        if (paymentMethod === "Rewards") {
                            cMatch.points -= Math.floor(total * 10);
                        } else {
                            cMatch.points += Math.floor(total);
                            cMatch.spend += total;
                        }
                        db.set("customers", customers);
                        this.selectedCustomer = cMatch;
                    }
                }

                const tx = {
                    id: "TX-" + Math.floor(100000 + Math.random() * 900000),
                    timestamp: new Date().toISOString(),
                    employeeId: this.currentUser.id,
                    employeeName: this.currentUser.name,
                    customerId: this.selectedCustomer ? this.selectedCustomer.id : null,
                    customerName: this.selectedCustomer ? this.selectedCustomer.name : "Walk-in Guest",
                    items: [...this.cart],
                    subtotal: subtotal,
                    tax: tax,
                    total: total,
                    paymentMethod: methodString
                };

                const txs = db.get("transactions");
                txs.unshift(tx);
                db.set("transactions", txs);

                this.lastTransaction = tx;
                this.cart = [];
                this.checkoutModalOpen = false;
                this.receiptModalOpen = true;
                this.showToast("Transaction processing sequence completed.");
                this.render();
            }

            //------------------------------------------------------------------------
            // INVENTORY MANAGEMENT METRICS
            //------------------------------------------------------------------------
            saveProduct(prodData) {
                const prods = db.get("products");
                if (prodData.id) {
                    const idx = prods.findIndex(p => p.id === prodData.id);
                    if (idx !== -1) prods[idx] = prodData;
                } else {
                    prodData.id = "p-" + Date.now();
                    prods.push(prodData);
                }
                db.set("products", prods);
                this.showToast("Product master manifest updated.");
                this.render();
            }

            deleteProduct(id) {
                let prods = db.get("products");
                prods = prods.filter(p => p.id !== id);
                db.set("products", prods);
                this.showToast("Product item dropped from storage nodes.", "danger");
                this.render();
            }

            simulateBarcodeScan(sku) {
                const prods = db.get("products");
                const match = prods.find(p => p.sku === sku);
                if (match) {
                    this.addToCart(match.id);
                    this.showToast(`Scanned: ${match.name}`);
                } else {
                    this.showToast(`SKU match failure: ${sku}`, "danger");
                }
            }

            //------------------------------------------------------------------------
            // CUSTOMER STORAGE DELETIONS AND CREATIONS (CRUD COMPLETE)
            //------------------------------------------------------------------------
            saveCustomer(custData) {
                const custs = db.get("customers");
                if (custData.id) {
                    const idx = custs.findIndex(c => c.id === custData.id);
                    if (idx !== -1) custs[idx] = custData;
                } else {
                    custData.id = "c-" + Date.now();
                    custData.spend = 0;
                    custData.points = 0;
                    custs.push(custData);
                }
                db.set("customers", custs);
                this.showToast("Customer database logs locked.");
                this.render();
            }

            deleteCustomer(id) {
                if (!confirm("Are you sure you want to completely erase this customer profile node from historical relational data systems?")) return;
                let custs = db.get("customers");
                custs = custs.filter(c => c.id !== id);
                db.set("customers", custs);
                if (this.selectedCustomer && this.selectedCustomer.id === id) { this.selectedCustomer = null; }
                this.showToast("Consumer profile detached and dropped.", "danger");
                this.render();
            }

            //------------------------------------------------------------------------
            // STAFF MANAGEMENT MUTATORS AND CRITICAL DELETIONS (CRUD COMPLETE)
            //------------------------------------------------------------------------
            saveEmployee(empData) {
                const emps = db.get("employees");
                if (empData.id) {
                    const idx = emps.findIndex(e => e.id === empData.id);
                    if (idx !== -1) emps[idx] = empData;
                } else {
                    empData.id = "e-" + Date.now();
                    emps.push(empData);
                }
                db.set("employees", emps);
                this.showToast("Employee roster matrix modified.");
                this.render();
            }

            deleteEmployee(id) {
                if (this.currentUser.id === id) {
                    this.showToast("Cannot drop active system node identity.", "danger");
                    return;
                }
                if (!confirm("Are you sure you want to drop this employee profile and terminate system credentials access codes?")) return;
                let emps = db.get("employees");
                emps = emps.filter(e => e.id !== id);
                db.set("employees", emps);
                this.showToast("Staff resource token revoked and purged.", "danger");
                this.render();
            }

            updateTimecard(tcId, clockIn, clockOut, approved) {
                const tcs = db.get("timecards");
                const idx = tcs.findIndex(t => t.id === tcId);
                if (idx !== -1) {
                    tcs[idx].clockIn = clockIn;
                    tcs[idx].clockOut = clockOut;
                    tcs[idx].approved = approved;
                    db.set("timecards", tcs);
                    this.showToast("Time card verified and modified.");
                    this.render();
                }
            }

            //------------------------------------------------------------------------
            // ANALYTICS & VISUAL DATA CHARTS ENGINE
            //------------------------------------------------------------------------
            initReportingCharts() {
                const txs = db.get("transactions");
                const dailyTotals = {};
                txs.forEach(t => {
                    const dateStr = t.timestamp.split('T')[0];
                    dailyTotals[dateStr] = (dailyTotals[dateStr] || 0) + t.total;
                });
                const sortedDates = Object.keys(dailyTotals).sort().slice(-7);
                const dailyData = sortedDates.map(d => dailyTotals[d]);

                const ctxSales = document.getElementById('chart-sales-trend');
                if (ctxSales) {
                    new Chart(ctxSales, {
                        type: 'line',
                        data: {
                            labels: sortedDates,
                            datasets: [{
                                data: dailyData,
                                borderColor: '#3b82f6',
                                tension: 0.2,
                                fill: false
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }

                const itemQtyMap = {};
                txs.forEach(t => { t.items.forEach(i => { itemQtyMap[i.name] = (itemQtyMap[i.name] || 0) + i.quantity; }); });
                const topItems = Object.keys(itemQtyMap).sort((a,b) => itemQtyMap[b] - itemQtyMap[a]).slice(0, 5);
                const topItemQtys = topItems.map(it => itemQtyMap[it]);

                const ctxProd = document.getElementById('chart-top-products');
                if (ctxProd) {
                    new Chart(ctxProd, {
                        type: 'bar',
                        data: {
                            labels: topItems,
                            datasets: [{ data: topItemQtys, backgroundColor: ['#22c55e', '#3b82f6', '#eab308', '#a855f7', '#6366f1'] }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }
            }

            exportCSV() {
                const txs = db.get("transactions");
                let csv = "Transaction ID,Timestamp,Employee,Customer,Total,Payment Method\n";
                txs.forEach(t => { csv += `${t.id},${t.timestamp},${t.employeeName},${t.customerName},${t.total.toFixed(2)},${t.paymentMethod}\n`; });
                console.log("--- SYSTEM METRIC EXPORT COMPLETED ---\n", csv);
                this.showToast("CSV stream generated to debugger log console layout pane.");
            }

            resetDatabase() {
                db.seed();
                this.globalSettings = db.get("settings");
                this.cart = [];
                this.selectedCustomer = null;
                this.showToast("Enterprise transaction data tables seeded.");
                this.render();
            }

            //------------------------------------------------------------------------
            // MAIN STRUCTURE COMPILERS & TEMPLATE ENGINES
            //------------------------------------------------------------------------
            render() {
                const container = document.getElementById("root-app");
                if (!this.currentUser) {
                    container.innerHTML = this.templateLogin();
                    return;
                }

                container.innerHTML = `
                    <div class="flex h-full overflow-hidden">
                        <aside class="w-20 md:w-64 bg-slate-950 border-r border-slate-800 flex flex-col justify-between z-10">
                            <div>
                                <div class="h-16 flex items-center px-6 border-b border-slate-800 gap-3">
                                    <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold text-lg shadow-lg">A</div>
                                    <span class="font-bold text-lg hidden md:inline tracking-tight text-slate-200">${this.globalSettings.storeName}</span>
                                </div>
                                <nav class="p-4 space-y-1">
                                    ${this.navItem("register", "fa-cash-register", "Register Terminal")}
                                    ${this.navItem("inventory", "fa-boxes-stacked", "Inventory Master")}
                                    ${this.navItem("customers", "fa-users", "Loyalty Database")}
                                    ${this.currentUser.role !== 'Cashier' ? this.navItem("employees", "fa-id-card", "Staff & Timecards") : ''}
                                    ${this.currentUser.role !== 'Cashier' ? this.navItem("reporting", "fa-chart-pie", "Analytics Ledger") : ''}
                                    ${this.currentUser.role === 'Admin' ? this.navItem("settings", "fa-sliders", "Global Configurations") : ''}
                                </nav>
                            </div>
                            <div class="p-4 border-t border-slate-800 space-y-3">
                                <div class="hidden md:flex items-center gap-3 px-2">
                                    <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-blue-400 font-semibold border border-slate-700">
                                        ${this.currentUser.name.charAt(0)}
                                    </div>
                                    <div class="overflow-hidden">
                                        <h4 class="text-xs font-semibold text-slate-200 truncate">${this.currentUser.name}</h4>
                                        <p class="text-[10px] font-medium text-slate-400 uppercase tracking-wider">${this.currentUser.role}</p>
                                    </div>
                                </div>
                                <button onclick="state.logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-sm font-medium text-rose-400 bg-rose-950/20 border border-rose-900/30 rounded-xl hover:bg-rose-950/40 transition">
                                    <i class="fas fa-sign-out-alt"></i>
                                    <span class="hidden md:inline">Disconnect</span>
                                </button>
                            </div>
                        </aside>

                        <main class="flex-1 flex flex-col bg-slate-900 overflow-hidden">
                            <header class="h-16 bg-slate-950 border-b border-slate-800 px-6 flex items-center justify-between z-10 flex-shrink-0">
                                <div class="flex items-center gap-4">
                                    <h2 class="text-xl font-bold tracking-tight text-slate-100 capitalize">${this.currentView} Panel</h2>
                                </div>
                                <div class="flex items-center gap-4">
                                    <div class="flex items-center gap-2 bg-slate-900 border border-slate-800 px-4 py-1.5 rounded-xl shadow-inner">
                                        <div class="w-2 h-2 rounded-full ${db.get("timecards").some(t => t.employeeId === this.currentUser.id && !t.clockOut) ? 'bg-emerald-500 animate-pulse' : 'bg-slate-600'}"></div>

            toggleScannerModal() {
                const modal = document.getElementById("scanner-modal");
                if (modal) {
                    if (modal.classList.contains("hidden")) {
                        modal.classList.remove("hidden");
                        this.startCameraStream();
                    } else {
                        modal.classList.add("hidden");
                        this.stopCameraStream();
                    }
                }
            }

            startCameraStream() {
                setTimeout(() => {
                    const qrEl = document.getElementById("interactive-reader");
                    if (qrEl) {
                        this.html5QrScanner = new Html5Qrcode("interactive-reader");
                        this.html5QrScanner.start(
                            { facingMode: "environment" },
                            { fps: 10, qrbox: { width: 250, height: 100 } },
                            (decodedText) => { this.simulateBarcodeScan(decodedText); this.toggleScannerModal(); },
                            () => {}
                        ).then(() => { document.getElementById("fallback-scanner-ui").style.display = "none"; })
                        .catch(() => { document.getElementById("fallback-scanner-ui").style.display = "flex"; });
                    }
                }, 100);
            }

            stopCameraStream() { if (this.html5QrScanner) { this.html5QrScanner.stop().then(() => { this.html5QrScanner = null; }).catch(() => {}); } }

            openProductModal(id = null) {
                const modal = document.getElementById("product-modal");
                const form = document.getElementById("prod-form");
                const title = document.getElementById("prod-modal-title");
                form.reset();
                document.getElementById("prod-id").value = "";
                if (id) {
                    title.innerText = "Edit Catalog Product Entity Record";
                    const p = db.get("products").find(prod => prod.id === id);
                    if (p) {
                        document.getElementById("prod-id").value = p.id;
                        document.getElementById("prod-name").value = p.name;
                        document.getElementById("prod-sku").value = p.sku;
                        document.getElementById("prod-category").value = p.category;
                        document.getElementById("prod-price").value = p.price;
                        document.getElementById("prod-cost").value = p.cost;
                        document.getElementById("prod-stock").value = p.stock;
                    }
                } else { title.innerText = "Inject New Product Configuration Entity"; }
                modal.classList.remove("hidden");
            }
            closeProductModal() { document.getElementById("product-modal").classList.add("hidden"); }
            submitProductForm() {
                const pData = {
                    id: document.getElementById("prod-id").value || null,
                    name: document.getElementById("prod-name").value,
                    sku: document.getElementById("prod-sku").value,
                    category: document.getElementById("prod-category").value,
                    price: parseFloat(document.getElementById("prod-price").value),
                    cost: parseFloat(document.getElementById("prod-cost").value),
                    stock: parseInt(document.getElementById("prod-stock").value)
                };
                this.saveProduct(pData);
                this.closeProductModal();
            }
