<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>POS Terminal</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pro POS">

    <style>
        :root {
            --bg-dark: #09090b;
            --surface-dark: #18181b;
            --surface-card: #27272a;
            --border-dark: #27272a;
            --text-light: #f4f4f5;
            --text-dim: #a1a1aa;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            display: none; /* Stays hidden until native iOS login passes */
            flex-direction: column;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
        }

        header {
            background-color: var(--surface-dark);
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-dark);
        }

        header h1 { font-size: 1.3rem; font-weight: 700; }

        .metrics-pill {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent-blue);
            background: #1e3a8a;
            padding: 8px 16px;
            border-radius: 20px;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            flex: 1;
            overflow: hidden;
        }

        .products-section {
            padding: 24px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .product-card {
            background-color: var(--surface-dark);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border-dark);
            cursor: pointer;
            transition: transform 0.08s, background-color 0.08s;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card:active {
            transform: scale(0.95);
            background-color: var(--surface-card);
        }

        .product-name { font-weight: 600; font-size: 1rem; }
        .product-price { color: var(--accent-blue); font-weight: 700; font-size: 1.15rem; }

        .cart-sidebar {
            background-color: var(--surface-dark);
            border-left: 1px solid var(--border-dark);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .cart-header {
            padding: 20px 24px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-dark);
        }

        .clear-btn { background: none; border: none; color: var(--accent-red); font-weight: 600; cursor: pointer; }
        .cart-items-list { flex: 1; overflow-y: auto; padding: 10px 24px; }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-dark);
        }

        .item-details h4 { font-size: 1rem; font-weight: 600; }
        .item-details p { font-size: 0.85rem; color: var(--text-dim); }
        .item-price-final { font-weight: 700; }

        .cart-checkout-footer {
            padding: 24px;
            background-color: var(--bg-dark);
            border-top: 1px solid var(--border-dark);
        }

        .ledger-line { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .ledger-line.total-bold {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            font-size: 1.4rem;
            font-weight: 800;
            border-top: 1px solid var(--border-dark);
            padding-top: 16px;
            margin-bottom: 20px;
        }

        .charge-button {
            width: 100%;
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Register Terminal 01</h1>
        <div class="metrics-pill" id="live-sales-tracker">Today's Sales: $0.00</div>
    </header>

    <div class="app-container">
        <section class="products-section">
            <div class="products-grid" id="catalog-hook"></div>
        </section>

        <aside class="cart-sidebar">
            <div class="cart-header">
                <span>Current Order</span>
                <button class="clear-btn" onclick="clearActiveOrder()">Clear All</button>
            </div>
            <div class="cart-items-list" id="cart-hook"></div>
            <div class="cart-checkout-footer">
                <div class="ledger-line"><span>Subtotal</span><span id="calc-subtotal">$0.00</span></div>
                <div class="ledger-line"><span>Estimated Tax (7%)</span><span id="calc-tax">$0.00</span></div>
                <div class="ledger-line total-bold"><span>Total</span><span id="calc-total">$0.00</span></div>
                <button class="charge-button" onclick="checkoutOrder()">Charge &amp; Complete</button>
            </div>
        </aside>
    </div>

    <script>
        // Set your password right here
        const ACCESS_SECRET = "9091237"; 

        // Uses native iPad pop-up gate immediately on page render
        function runGatekeeper() {
            let authenticated = false;
            while (!authenticated) {
                const userInput = prompt("Terminal Locked. Enter your access pin code:");
                
                // If they hit cancel
                if (userInput === null) {
                    alert("Access Denied.");
                    window.location.reload();
                    return;
                }

                if (userInput === ACCESS_SECRET) {
                    authenticated = true;
                    // Reveal the layout view
                    document.body.style.display = 'flex';
                    startupPOS();
                } else {
                    alert("Invalid access code. Try again.");
                }
            }
        }

        const productCatalog = [
            { id: 1, name: "Premium Tier Box", price: 45.00 },
            { id: 2, name: "Standard Option A", price: 25.00 },
            { id: 3, name: "Standard Option B", price: 15.00 },
            { id: 4, name: "Add-On Upgrade", price: 10.00 },
            { id: 5, name: "Essential Pack", price: 30.00 },
            { id: 6, name: "Custom Setup Svc", price: 65.00 },
            { id: 7, name: "Mini Gift Item", price: 5.50 },
            { id: 8, name: "Deluxe Bundle Kit", price: 85.00 }
        ];

        let activeCart = [];
        let runningSalesTotal = parseFloat(localStorage.getItem('pos_running_sales')) || 0;

        function startupPOS() {
            const gridContainer = document.getElementById('catalog-hook');
            gridContainer.innerHTML = '';
            
            productCatalog.forEach(item => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => addItemToOrder(item.id);
                card.innerHTML = `
                    <div class="product-name">${item.name}</div>
                    <div class="product-price">$${item.price.toFixed(2)}</div>
                `;
                gridContainer.appendChild(card);
            });
            refreshHistoricalDisplay();
        }

        function addItemToOrder(itemId) {
            const catalogItem = productCatalog.find(p => p.id === itemId);
            const matchesInCart = activeCart.find(cartItem => cartItem.id === itemId);
            if (matchesInCart) { matchesInCart.quantity += 1; } 
            else { activeCart.push({ ...catalogItem, quantity: 1 }); }
            refreshCartUI();
        }

        function clearActiveOrder() { activeCart = []; refreshCartUI(); }

        function refreshCartUI() {
            const listContainer = document.getElementById('cart-hook');
            listContainer.innerHTML = '';
            let structuralSubtotal = 0;

            activeCart.forEach(item => {
                const rowCost = item.price * item.quantity;
                structuralSubtotal += rowCost;
                const rowElement = document.createElement('div');
                rowElement.className = 'cart-item-row';
                rowElement.innerHTML = `
                    <div class="item-details">
                        <h4>${item.name}</h4>
                        <p>$${item.price.toFixed(2)} x ${item.quantity}</p>
                    </div>
                    <div class="item-price-final">$${rowCost.toFixed(2)}</div>
                `;
                listContainer.appendChild(rowElement);
            });

            const calculatedTax = structuralSubtotal * 0.07;
            const finalCalculatedTotal = structuralSubtotal + calculatedTax;

            document.getElementById('calc-subtotal').innerText = `$${structuralSubtotal.toFixed(2)}`;
            document.getElementById('calc-tax').innerText = `$${calculatedTax.toFixed(2)}`;
            document.getElementById('calc-total').innerText = `$${finalCalculatedTotal.toFixed(2)}`;
        }

        function checkoutOrder() {
            if (activeCart.length === 0) return;
            const activeTotalString = document.getElementById('calc-total').innerText;
            const absoluteTotalNumeric = parseFloat(activeTotalString.replace('$', ''));

            runningSalesTotal += absoluteTotalNumeric;
            localStorage.setItem('pos_running_sales', runningSalesTotal.toString());

            alert(`Sale Finalized Successfully!\nProcessed Charge Amount: ${activeTotalString}`);
            clearActiveOrder();
            refreshHistoricalDisplay();
        }

        function refreshHistoricalDisplay() {
            document.getElementById('live-sales-tracker').innerText = `Today's Sales: $${runningSalesTotal.toFixed(2)}`;
        }

        // Fire the iPad system text prompt immediately on page mount
        window.onload = runGatekeeper;
    </script>
</body>
</html>
