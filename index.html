<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-900 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aegis POS Enterprise</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aegis POS">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#030712',
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        input, textarea {
            -webkit-user-select: text !important;
            user-select: text !important;
        }
        /* Custom scrollbar mechanics for high-throughput retail panes */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="h-full overflow-hidden font-sans antialiased selection:bg-blue-500 selection:text-white">

    <div id="global-toast" class="fixed top-6 right-6 z-50 transform translate-y-20 opacity-0 pointer-events-none transition-all duration-300 flex items-center p-4 rounded-xl shadow-2xl border bg-slate-800 border-slate-700 max-w-sm">
        <div id="toast-icon" class="flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-white mr-3"></div>
        <div>
            <p id="toast-msg" class="text-sm font-semibold text-slate-200"></p>
        </div>
    </div>

    <div id="root-app" class="h-full flex flex-col"></div>

    <script>
        //------------------------------------------------------------------------
        // DATA MODELS, PERSISTENCE ENGINE & RECONCILIATION SEEDING
        //------------------------------------------------------------------------
        const DEFAULT_PRODUCTS = [
            { id: "p1", name: "Premium Tier Gift Box", sku: "88811101", price: 45.00, cost: 18.50, stock: 59, category: "Gifts" },
            { id: "p2", name: "Standard Luxury Pack A", sku: "88811102", price: 25.00, cost: 11.00, stock: 112, category: "Bundles" },
            { id: "p3", name: "Standard Fragrance Pack B", sku: "88811103", price: 15.00, cost: 6.25, stock: 84, category: "Fragrance" },
            { id: "p4", name: "Essential Aromatherapy Upgrade", sku: "88811104", price: 10.00, cost: 3.10, stock: 240, category: "Upgrades" },
            { id: "p5", name: "Elegance Collection Kit", sku: "88811105", price: 30.00, cost: 12.00, stock: 45, category: "Bundles" },
            { id: "p6", name: "Custom Counter Top Display Svc", sku: "88811106", price: 65.00, cost: 0.00, stock: 999, category: "Services" },
            { id: "p7", name: "Mini Sample Gift Tray", sku: "88811107", price: 5.50, cost: 1.75, stock: 14, category: "Gifts" },
            { id: "p8", name: "Deluxe Executive Streetwear Trunk", sku: "88811108", price: 85.00, cost: 39.00, stock: 32, category: "Gifts" }
        ];

        const DEFAULT_EMPLOYEES = [
            { id: "e1", name: "Brady Behrendt", pin: "9091237", role: "Admin", wage: 34.50 },
            { id: "e2", name: "Eduardo Sanchez", pin: "1111", role: "Manager", wage: 26.00 },
            { id: "e3", name: "Alex Mercer", pin: "2222", role: "Cashier", wage: 16.50 }
        ];

        const DEFAULT_CUSTOMERS = [
            { id: "c1", name: "John Miller", phone: "3205550192", email: "jmiller@gmail.com", spend: 340.50, points: 120 },
            { id: "c2", name: "Sarah Jenkins", phone: "6125559843", email: "sjenkins@yahoo.com", spend: 1250.00, points: 450 },
            { id: "c3", name: "Marcus Brody", phone: "7635552311", email: "mbrody@outlook.com", spend: 45.50, points: 15 }
        ];

        class DatabaseEngine {
            constructor() {
                this.init();
            }
            init() {
                if (!localStorage.getItem("pos_initialized")) {
                    this.seed();
                }
            }
            seed() {
                localStorage.setItem("pos_products", JSON.stringify(DEFAULT_PRODUCTS));
                localStorage.setItem("pos_employees", JSON.stringify(DEFAULT_EMPLOYEES));
                localStorage.setItem("pos_customers", JSON.stringify(DEFAULT_CUSTOMERS));
                localStorage.setItem("pos_timecards", JSON.stringify([]));
                
                // Construct historical transactional timeline over 30 elapsed days
                const txHistory = [];
                const baseDate = new Date();
                for (let i = 30; i >= 0; i--) {
                    const txDate = new Date(baseDate.getTime() - (i * 24 * 60 * 60 * 1000));
                    // Seed randomized traffic spikes
                    const dayVolume = Math.floor(Math.random() * 8) + 3; 
                    for (let j = 0; j < dayVolume; j++) {
                        const prod = DEFAULT_PRODUCTS[Math.floor(Math.random() * DEFAULT_PRODUCTS.length)];
                        const emp = DEFAULT_EMPLOYEES[Math.floor(Math.random() * DEFAULT_EMPLOYEES.length)];
                        const cust = DEFAULT_CUSTOMERS[Math.floor(Math.random() * DEFAULT_CUSTOMERS.length)];
                        const qty = Math.floor(Math.random() * 2) + 1;
                        const subtotal = prod.price * qty;
                        const tax = subtotal * 0.07;
                        const total = subtotal + tax;

                        txHistory.push({
                            id: "TX-" + Math.floor(100000 + Math.random() * 900000),
                            timestamp: txDate.toISOString(),
                            employeeId: emp.id,
                            employeeName: emp.name,
                            customerId: cust.id,
                            customerName: cust.name,
                            items: [{ id: prod.id, name: prod.name, price: prod.price, quantity: qty, discount: 0 }],
                            subtotal: subtotal,
                            tax: tax,
                            total: total,
                            paymentMethod: Math.random() > 0.3 ? "Card" : "Cash"
                        });
                    }
                }
                localStorage.setItem("pos_transactions", JSON.stringify(txHistory));
                localStorage.setItem("pos_settings", JSON.stringify({
                    storeName: "Aegis OS Terminal",
                    taxRate: 7.00,
                    currencySymbol: "$",
                    receiptFooter: "Thank you for shopping at Aegis Retail Network."
                }));
                localStorage.setItem("pos_initialized", "true");
            }
            get(key) { return JSON.parse(localStorage.getItem("pos_" + key)); }
            set(key, data) { localStorage.setItem("pos_" + key, JSON.stringify(data)); }
        }

        const db = new DatabaseEngine();

        //------------------------------------------------------------------------
        // SYSTEM CONTROLLER STATE MACHINE MANAGER
        //------------------------------------------------------------------------
        class StateMachine {
            constructor() {
                this.currentUser = null;
                this.currentView = "register"; 
                this.cart = [];
                this.selectedCustomer = null;
                this.globalSettings = db.get("settings");
                this.searchQuery = "";
                this.currentCategory = "All";
                this.html5QrScanner = null;
                this.checkoutModalOpen = false;
                this.receiptModalOpen = false;
                this.lastTransaction = null;
            }

            setView(viewName) {
                if (!this.currentUser && viewName !== "login") return;
                this.currentView = viewName;
                this.render();
                if (viewName === "reporting") {
                    this.initReportingCharts();
                }
            }

            showToast(msg, type = "success") {
                const toast = document.getElementById("global-toast");
                const icon = document.getElementById("toast-icon");
                const text = document.getElementById("toast-msg");
                
                text.innerText = msg;
                if (type === "success") {
                    icon.className = "flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-white mr-3 bg-emerald-500";
                    icon.innerHTML = '<i class="fas fa-check-circle"></i>';
                } else if (type === "danger") {
                    icon.className = "flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-white mr-3 bg-rose-500";
                    icon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
                } else {
                    icon.className = "flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-white mr-3 bg-blue-500";
                    icon.innerHTML = '<i class="fas fa-info-circle"></i>';
                }
                
                toast.classList.remove("translate-y-20", "opacity-0", "pointer-events-none");
                setTimeout(() => {
                    toast.classList.add("translate-y-20", "opacity-0", "pointer-events-none");
                }, 3000);
            }

            login(pin) {
                const employees = db.get("employees");
                const match = employees.find(e => e.pin === pin);
                if (match) {
                    this.currentUser = match;
                    this.setView("register");
                    this.showToast(`Authorized: Welcome ${match.name}`);
                } else {
                    this.showToast("Invalid Credentials PIN", "danger");
                }
            }

            logout() {
                this.currentUser = null;
                this.setView("login");
                this.showToast("Session disconnected.");
            }

            toggleClock() {
                const timecards = db.get("timecards");
                const openCardIndex = timecards.findIndex(tc => tc.employeeId === this.currentUser.id && !tc.clockOut);
                const now = new Date().toISOString();

                if (openCardIndex !== -1) {
                    timecards[openCardIndex].clockOut = now;
                    db.set("timecards", timecards);
                    this.showToast("Clock Out logged successfully.");
                } else {
                    timecards.push({
                        id: "TC-" + Date.now(),
                        employeeId: this.currentUser.id,
                        employeeName: this.currentUser.name,
                        clockIn: now,
                        clockOut: null,
                        approved: false
                    });
                    db.set("timecards", timecards);
                    this.showToast("Clock In logged successfully.");
                }
                this.render();
            }

            //------------------------------------------------------------------------
            // TRANSACTIONARY CORE LOGIC ENGINE (REGISTER PANES)
            //------------------------------------------------------------------------
            addToCart(productId) {
                const products = db.get("products");
                const item = products.find(p => p.id === productId);
                if (!item) return;

                if (item.stock <= 0) {
                    this.showToast("Item out of stock!", "danger");
                    return;
                }

                const existing = this.cart.find(c => c.id === productId);
                if (existing) {
                    if (existing.quantity >= item.stock) {
                        this.showToast("Cannot exceed available physical stock limits.", "danger");
                        return;
                    }
                    existing.quantity++;
                } else {
                    this.cart.push({ ...item, quantity: 1, discount: 0 });
                }
                this.render();
            }

            updateCartQty(productId, qty) {
                const products = db.get("products");
                const targetProd = products.find(p => p.id === productId);
                const item = this.cart.find(c => c.id === productId);
                if (!item) return;

                if (qty <= 0) {
                    this.cart = this.cart.filter(c => c.id !== productId);
                } else {
                    if (qty > targetProd.stock) {
                        this.showToast("Insufficient stock inventory allocation.", "danger");
                        return;
                    }
                    item.quantity = qty;
                }
                this.render();
            }

            applyLineDiscount(productId, amt) {
                const item = this.cart.find(c => c.id === productId);
                if (!item) return;
                item.discount = Math.max(0, parseFloat(amt) || 0);
                this.render();
            }

            attachCustomer(phoneOrName) {
                const customers = db.get("customers");
                const match = customers.find(c => c.phone === phoneOrName || c.name.toLowerCase().includes(phoneOrName.toLowerCase()));
                if (match) {
                    this.selectedCustomer = match;
                    this.showToast(`Customer connected: ${match.name}`);
                } else {
                    this.showToast("No consumer profile record matched.", "danger");
                }
                this.render();
            }

            detachCustomer() {
                this.selectedCustomer = null;
                this.render();
            }

            getTotals() {
                let subtotal = 0;
                this.cart.forEach(c => {
                    subtotal += (c.price * c.quantity) - c.discount;
                });
                const tax = subtotal * (parseFloat(this.globalSettings.taxRate) / 100);
                const total = subtotal + tax;
                return { subtotal, tax, total };
            }

            processCheckout(paymentMethod) {
                const { subtotal, tax, total } = this.getTotals();
                if (this.cart.length === 0) return;

                if (paymentMethod === "Rewards") {
                    if (!this.selectedCustomer || this.selectedCustomer.points < Math.floor(total * 10)) {
                        this.showToast("Insufficient reward metrics point matrix balance.", "danger");
                        return;
                    }
                }

                // Mutate stock limits and save
                const products = db.get("products");
                this.cart.forEach(c => {
                    const p = products.find(prod => prod.id === c.id);
                    if (p) p.stock = Math.max(0, p.stock - c.quantity);
                });
                db.set("products", products);

                // Mutate consumer loyalty parameters
                const customers = db.get("customers");
                if (this.selectedCustomer) {
                    const cMatch = customers.find(cust => cust.id === this.selectedCustomer.id);
                    if (cMatch) {
                        if (paymentMethod === "Rewards") {
                            cMatch.points -= Math.floor(total * 10);
                        } else {
                            const earned = Math.floor(total);
                            cMatch.points += earned;
                            cMatch.spend += total;
                        }
                        db.set("customers", customers);
                        this.selectedCustomer = cMatch; // Update current ref
                    }
                }

                // Build permanent transactional metadata artifact
                const tx = {
                    id: "TX-" + Math.floor(100000 + Math.random() * 900000),
                    timestamp: new Date().toISOString(),
                    employeeId: this.currentUser.id,
                    employeeName: this.currentUser.name,
                    customerId: this.selectedCustomer ? this.selectedCustomer.id : null,
                    customerName: this.selectedCustomer ? this.selectedCustomer.name : "Walk-in Guest",
                    items: [...this.cart],
                    subtotal: subtotal,
                    tax: tax,
                    total: total,
                    paymentMethod: paymentMethod
                };

                const txs = db.get("transactions");
                txs.unshift(tx);
                db.set("transactions", txs);

                this.lastTransaction = tx;
                this.cart = [];
                this.checkoutModalOpen = false;
                this.receiptModalOpen = true;
                this.showToast("Transaction successfully routed.");
                this.render();
            }

            //------------------------------------------------------------------------
            // INVENTORY MUTATION ENGINE
            //------------------------------------------------------------------------
            saveProduct(prodData) {
                const prods = db.get("products");
                if (prodData.id) {
                    const idx = prods.findIndex(p => p.id === prodData.id);
                    if (idx !== -1) prods[idx] = prodData;
                } else {
                    prodData.id = "p-" + Date.now();
                    prods.push(prodData);
                }
                db.set("products", prods);
                this.showToast("Product master manifest updated.");
                this.render();
            }

            deleteProduct(id) {
                let prods = db.get("products");
                prods = prods.filter(p => p.id !== id);
                db.set("products", prods);
                this.showToast("Product item dropped from terminal catalogs.", "danger");
                this.render();
            }

            simulateBarcodeScan(sku) {
                const prods = db.get("products");
                const match = prods.find(p => p.sku === sku);
                if (match) {
                    this.addToCart(match.id);
                    this.showToast(`Scanned asset: ${match.name}`);
                } else {
                    this.showToast(`SKU barcode matrix match failure: ${sku}`, "danger");
                }
            }

            //------------------------------------------------------------------------
            // CUSTOMER PROFILE REGISTRATION ROUTINES
            //------------------------------------------------------------------------
            saveCustomer(custData) {
                const custs = db.get("customers");
                if (custData.id) {
                    const idx = custs.findIndex(c => c.id === custData.id);
                    if (idx !== -1) custs[idx] = custData;
                } else {
                    custData.id = "c-" + Date.now();
                    custData.spend = 0;
                    custData.points = 0;
                    custs.push(custData);
                }
                db.set("customers", custs);
                this.showToast("Customer database log locked.");
                this.render();
            }

            //------------------------------------------------------------------------
            // HUMAN RESOURCE MUTATION INTERFACES
            //------------------------------------------------------------------------
            saveEmployee(empData) {
                const emps = db.get("employees");
                if (empData.id) {
                    const idx = emps.findIndex(e => e.id === empData.id);
                    if (idx !== -1) emps[idx] = empData;
                } else {
                    empData.id = "e-" + Date.now();
                    emps.push(empData);
                }
                db.set("employees", emps);
                this.showToast("Employee roster matrix modified.");
                this.render();
            }

            updateTimecard(tcId, clockIn, clockOut, approved) {
                const tcs = db.get("timecards");
                const idx = tcs.findIndex(t => t.id === tcId);
                if (idx !== -1) {
                    tcs[idx].clockIn = clockIn;
                    tcs[idx].clockOut = clockOut;
                    tcs[idx].approved = approved;
                    db.set("timecards", tcs);
                    this.showToast("Time card verified and modified.");
                    this.render();
                }
            }

            //------------------------------------------------------------------------
            // METRIC SYSTEM DASHBOARD REPORTING ARCHITECTURE
            //------------------------------------------------------------------------
            initReportingCharts() {
                const txs = db.get("transactions");
                
                // Aggregate Daily Revenue Timeline
                const dailyTotals = {};
                txs.forEach(t => {
                    const dateStr = t.timestamp.split('T')[0];
                    dailyTotals[dateStr] = (dailyTotals[dateStr] || 0) + t.total;
                });
                const sortedDates = Object.keys(dailyTotals).sort().slice(-7);
                const dailyData = sortedDates.map(d => dailyTotals[d]);

                // Render Sales Chart Elements
                const ctxSales = document.getElementById('chart-sales-trend');
                if (ctxSales) {
                    new Chart(ctxSales, {
                        type: 'line',
                        data: {
                            labels: sortedDates,
                            datasets: [{
                                label: 'Gross Net Routing ($)',
                                data: dailyData,
                                borderColor: '#3b82f6',
                                tension: 0.2,
                                fill: false
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }

                // Volume Item Aggregation Loop Engine
                const itemQtyMap = {};
                txs.forEach(t => {
                    t.items.forEach(i => {
                        itemQtyMap[i.name] = (itemQtyMap[i.name] || 0) + i.quantity;
                    });
                });
                const topItems = Object.keys(itemQtyMap).sort((a,b) => itemQtyMap[b] - itemQtyMap[a]).slice(0, 5);
                const topItemQtys = topItems.map(it => itemQtyMap[it]);

                const ctxProd = document.getElementById('chart-top-products');
                if (ctxProd) {
                    new Chart(ctxProd, {
                        type: 'bar',
                        data: {
                            labels: topItems,
                            datasets: [{
                                data: topItemQtys,
                                backgroundColor: ['#22c55e', '#3b82f6', '#eab308', '#a855f7', '#6366f1']
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }
            }

            exportCSV() {
                const txs = db.get("transactions");
                let csv = "Transaction ID,Timestamp,Employee,Customer,Total,Payment Method\n";
                txs.forEach(t => {
                    csv += `${t.id},${t.timestamp},${t.employeeName},${t.customerName},${t.total.toFixed(2)},${t.paymentMethod}\n`;
                });
                console.log("--- SYSTEM METRIC EXPORT COMPLETED ---\n", csv);
                this.showToast("CSV data stream string deployed directly to developer console debugging pane.");
            }

            resetDatabase() {
                db.seed();
                this.globalSettings = db.get("settings");
                this.cart = [];
                this.selectedCustomer = null;
                this.showToast("Enterprise transaction state seeded successfully.");
                this.render();
            }

            //------------------------------------------------------------------------
            // GLOBAL TEMPLATE RENDERING CONTEXTS
            //------------------------------------------------------------------------
            render() {
                const container = document.getElementById("root-app");
                if (!this.currentUser) {
                    container.innerHTML = this.templateLogin();
                    return;
                }

                container.innerHTML = `
                    <div class="flex h-full overflow-hidden">
                        <aside class="w-20 md:w-64 bg-slate-950 border-r border-slate-800 flex flex-col justify-between z-10">
                            <div>
                                <div class="h-16 flex items-center px-6 border-b border-slate-800 gap-3">
                                    <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold text-lg shadow-lg">A</div>
                                    <span class="font-bold text-lg hidden md:inline tracking-tight text-slate-200">${this.globalSettings.storeName}</span>
                                </div>
                                <nav class="p-4 space-y-1">
                                    ${this.navItem("register", "fa-cash-register", "Register Terminal")}
                                    ${this.navItem("inventory", "fa-boxes-stacked", "Inventory Master")}
                                    ${this.navItem("customers", "fa-users", "Loyalty Database")}
                                    ${this.currentUser.role !== 'Cashier' ? this.navItem("employees", "fa-id-card", "Staff & Timecards") : ''}
                                    ${this.currentUser.role !== 'Cashier' ? this.navItem("reporting", "fa-chart-pie", "Analytics Ledger") : ''}
                                    ${this.currentUser.role === 'Admin' ? this.navItem("settings", "fa-sliders", "Global Configurations") : ''}
                                </nav>
                            </div>
                            <div class="p-4 border-t border-slate-800 space-y-3">
                                <div class="hidden md:flex items-center gap-3 px-2">
                                    <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-blue-400 font-semibold border border-slate-700">
                                        ${this.currentUser.name.charAt(0)}
                                    </div>
                                    <div class="overflow-hidden">
                                        <h4 class="text-xs font-semibold text-slate-200 truncate">${this.currentUser.name}</h4>
                                        <p class="text-[10px] font-medium text-slate-400 uppercase tracking-wider">${this.currentUser.role}</p>
                                    </div>
                                </div>
                                <button onclick="state.logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-sm font-medium text-rose-400 bg-rose-950/20 border border-rose-900/30 rounded-xl hover:bg-rose-950/40 transition">
                                    <i class="fas fa-sign-out-alt"></i>
                                    <span class="hidden md:inline">Disconnect</span>
                                </button>
                            </div>
                        </aside>

                        <main class="flex-1 flex flex-col bg-slate-900 overflow-hidden">
                            <header class="h-16 bg-slate-950 border-b border-slate-800 px-6 flex items-center justify-between z-10 flex-shrink-0">
                                <div class="flex items-center gap-4">
                                    <h2 class="text-xl font-bold tracking-tight text-slate-100 capitalize">${this.currentView} Panel</h2>
                                </div>
                                <div class="flex items-center gap-4">
                                    <div class="flex items-center gap-2 bg-slate-900 border border-slate-800 px-4 py-1.5 rounded-xl shadow-inner">
                                        <div class="w-2 h-2 rounded-full ${db.get("timecards").some(t => t.employeeId === this.currentUser.id && !t.clockOut) ? 'bg-emerald-500 animate-pulse' : 'bg-slate-600'}"></div>
                                        <span class="text-xs font-medium text-slate-400">Shift Tracker Log:</span>
                                        <button onclick="state.toggleClock()" class="text-xs font-bold text-blue-400 hover:underline">
                                            ${db.get("timecards").some(t => t.employeeId === this.currentUser.id && !t.clockOut) ? 'Clock Out' : 'Clock In'}
                                        </button>
                                    </div>
                                    <div class="text-sm font-semibold text-slate-300" id="live-clock"></div>
                                </div>
                            </header>

                            <div class="flex-1 overflow-hidden relative">
                                ${this.renderActiveSubView()}
                            </div>
                        </main>
                    </div>

                    ${this.checkoutModalOpen ? this.templateCheckoutModal() : ''}
                    ${this.receiptModalOpen ? this.templateReceiptModal() : ''}
                `;

                // Fire static live clock ticks
                this.updateLiveClock();
            }

            navItem(view, icon, label) {
                const active = this.currentView === view;
                return `

                        this.stopCameraStream();

                setTimeout(() => {
                    const qrEl = document.getElementById("interactive-reader");
                    if (qrEl) {
                        this.html5QrScanner = new Html5Qrcode("interactive-reader");
                        this.html5QrScanner.start(

                            (decodedText) => {
                                this.simulateBarcodeScan(decodedText);
                                this.toggleScannerModal();

                            () => {} // Suppress noisy frames log

                        const c = originalProd ? originalProd.cost : (i.price * 0.4); 
                        totalCost += (c * i.quantity);

                            ${this.kpiCard("Transaction Loops Logs", txs.length, "fa-receipt", "text-amber-500", false)}

                            <div class="flex-1 overflow-auto">
                                <table class="w-full border-collapse text-left text-sm text-slate-300">
                                    <thead class="bg-slate-950 text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-slate-800 sticky top-0">
                                        <tr>
                                            <th class="px-6 py-4">Transaction Token</th>
                                            <th class="px-6 py-4">Execution Time</th>
                                            <th class="px-6 py-4">Node Operator Context</th>
                                            <th class="px-6 py-4">CRM Consumer Anchor</th>
                                            <th class="px-6 py-4 text-center">Routing Engine Gateway</th>
                                            <th class="px-6 py-4 text-right">Debit Total</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-800/60 font-medium font-mono text-xs text-slate-400">
                                        ${txs.map(t => `
                                            <tr class="hover:bg-slate-900/40 transition">
                                                <td class="px-6 py-4 font-bold text-slate-200">${t.id}</td>
                                                <td class="px-6 py-4">${new Date(t.timestamp).toLocaleString()}</td>
                                                <td class="px-6 py-4 font-sans text-sm font-semibold text-slate-300">${t.employeeName}</td>
                                                <td class="px-6 py-4 font-sans text-sm text-slate-400">${t.customerName}</td>
                                                <td class="px-6 py-4 text-center"><span class="px-2 py-0.5 border rounded bg-slate-900 border-slate-800 font-sans font-bold text-[10px] uppercase tracking-wider text-slate-300">${t.paymentMethod}</span></td>
                                                <td class="px-6 py-4 text-right text-sm font-bold text-emerald-400">${this.globalSettings.currencySymbol}${t.total.toFixed(2)}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            }

            kpiCard(title, val, icon, color, isCurrency) {
                return `
                    <div class="bg-slate-950 border border-slate-800 p-5 rounded-2xl flex items-center justify-between shadow-sm">
                        <div class="space-y-1">
                            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">${title}</span>
                            <span class="text-2xl font-black text-white font-mono tracking-tight">${isCurrency ? this.globalSettings.currencySymbol : ''}${typeof val === 'number' ? val.toLocaleString([], {minimumFractionDigits: isCurrency ? 2 : 0, maximumFractionDigits: isCurrency ? 2 : 0}) : val}</span>
                        </div>
                        <div class="w-12 h-12 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center text-xl ${color}"><i class="fas ${icon}"></i></div>
                    </div>
                `;
            }

            //------------------------------------------------------------------------
            // CONTAINER MODULE VIEW 7: BACKEND STACK ADMIN DESIGN PARAMETERS
            //------------------------------------------------------------------------
            viewSettings() {
                return `
                    <div class="h-full overflow-y-auto p-6 max-w-4xl mx-auto space-y-6">
                        <div class="bg-slate-950 border border-slate-800 p-6 rounded-2xl space-y-6">
                            <div>
                                <h3 class="text-base font-bold text-white border-b border-slate-800 pb-3 flex items-center gap-2"><i class="fas fa-sliders text-blue-500"></i>Global Operational Configuration Variables</h3>
                                <p class="text-xs text-slate-400 mt-1">Configure foundational retail data schemas and localization values</p>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Store Node Branding Label:</label>
                                    <input type="text" id="set-store-name" value="${this.globalSettings.storeName}" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 text-slate-200">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Fiscal Tax Rate Parameter Matrix (%):</label>
                                    <input type="number" step="0.001" id="set-tax-rate" value="${this.globalSettings.taxRate}" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-sm font-mono outline-none focus:border-blue-500 text-slate-200">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Localization Currency Structural Symbol:</label>
                                    <input type="text" id="set-currency" value="${this.globalSettings.currencySymbol}" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-sm font-mono outline-none focus:border-blue-500 text-slate-200">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Receipt Output Static Message String:</label>
                                    <input type="text" id="set-footer" value="${this.globalSettings.receiptFooter}" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 text-slate-200">
                                </div>
                            </div>
                            <div class="flex justify-end border-t border-slate-800/60 pt-4 mt-2">
                                <button onclick="state.saveGlobalSettings()" class="px-5 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-xs font-bold transition uppercase tracking-wider shadow-lg shadow-blue-600/10"><i class="fas fa-floppy-disk mr-2"></i>Lock Variable Layout Configs</button>
                            </div>
                        </div>

                        <div class="bg-slate-950 border border-rose-950 p-6 rounded-2xl space-y-4">
                            <div>
                                <h3 class="text-base font-bold text-rose-400 flex items-center gap-2"><i class="fas fa-triangle-exclamation text-rose-500"></i>Data Core Integrity &amp; Destructive Pipeline Zone</h3>
                                <p class="text-xs text-rose-900/80 mt-1">Nuke or hard reset transactional states back to default seed matrices</p>
                            </div>
                            <p class="text-xs text-slate-400 leading-relaxed">Executing hard database re-seeds will flush all customized inventory lists, recorded payroll timecards, newly registered customer profiles, and transaction streams, replacing them with default sample metrics data structures over 30 days of historical operational logs.</p>
                            <div class="flex flex-wrap gap-3 pt-2">
                                <button onclick="state.resetDatabase()" class="px-4 py-2.5 bg-rose-950/40 border border-rose-900/60 text-rose-400 hover:bg-rose-900/30 rounded-xl text-xs font-bold transition uppercase tracking-wider"><i class="fas fa-database mr-2"></i>Flush &amp; Re-Seed Database Node</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            saveGlobalSettings() {
                const s = {
                    storeName: document.getElementById("set-store-name").value,
                    taxRate: parseFloat(document.getElementById("set-tax-rate").value),
                    currencySymbol: document.getElementById("set-currency").value,
                    receiptFooter: document.getElementById("set-footer").value
                };
                db.set("settings", s);
                this.globalSettings = s;
                this.showToast("Global system operational configurations modified.");
                this.render();
            }

            //------------------------------------------------------------------------
            // VISUAL DYNAMIC MODAL DRAWER FRAME: FINALIZE CHECKOUT WORKFLOW
            //------------------------------------------------------------------------
            templateCheckoutModal() {
                const { total } = this.getTotals();
                return `
                    <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 w-full max-w-md shadow-2xl relative">
                            <button onclick="state.closeCheckout()" class="absolute top-4 right-4 text-slate-500 hover:text-slate-300 text-lg transition"><i class="fas fa-times"></i></button>
                            <h3 class="text-lg font-black text-white mb-2 flex items-center gap-2"><i class="fas fa-cash-register text-emerald-500"></i>Ingest Gateway Protocol</h3>
                            <p class="text-xs text-slate-400 mb-6">Select transaction execution routing path for processing debit loop</p>
                            
                            <div class="bg-slate-950 border border-slate-800 rounded-xl p-4 text-center mb-6">
                                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1">Required Tender Value Due:</span>
                                <span class="text-3xl font-black text-emerald-400 font-mono">${this.globalSettings.currencySymbol}${total.toFixed(2)}</span>
                            </div>

                            <div class="space-y-3">
                                <button onclick="state.processCheckout('Card')" class="w-full p-4 bg-slate-800 hover:bg-slate-700/80 border border-slate-700 rounded-xl flex items-center justify-between transition text-left group">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-lg bg-blue-950 border border-blue-900/60 flex items-center justify-center text-blue-400"><i class="fas fa-credit-card"></i></div>
                                        <div>
                                            <h4 class="text-sm font-bold text-slate-200">Integrated Terminal Card Node</h4>
                                            <p class="text-[11px] text-slate-400">EMV / NFC Merchant Ledger Sync</p>
                                        </div>
                                    </div>
                                    <i class="fas fa-chevron-right text-slate-600 group-hover:text-slate-400 transition"></i>
                                </button>

                                <button onclick="state.processCheckout('Cash')" class="w-full p-4 bg-slate-800 hover:bg-slate-700/80 border border-slate-700 rounded-xl flex items-center justify-between transition text-left group">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-lg bg-emerald-950 border border-emerald-900/60 flex items-center justify-center text-emerald-400"><i class="fas fa-money-bill-wave"></i></div>
                                        <div>
                                            <h4 class="text-sm font-bold text-slate-200">Physical Cash Tender Process</h4>
                                            <p class="text-[11px] text-slate-400">Triggers absolute hardware drawer kickout</p>
                                        </div>
                                    </div>
                                    <i class="fas fa-chevron-right text-slate-600 group-hover:text-slate-400 transition"></i>
                                </button>

                                <button onclick="state.processCheckout('Rewards')" ${(!this.selectedCustomer || this.selectedCustomer.points < Math.floor(total * 10)) ? 'disabled' : ''} class="w-full p-4 bg-slate-800 hover:bg-slate-700/80 border border-slate-700 disabled:opacity-40 disabled:pointer-events-none rounded-xl flex items-center justify-between transition text-left group">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-lg bg-amber-950 border border-amber-900/60 flex items-center justify-center text-amber-400"><i class="fas fa-star"></i></div>
                                        <div>
                                            <h4 class="text-sm font-bold text-slate-200">Redeem Consumer Loyalty Points</h4>
                                            <p class="text-[11px] text-slate-400">Requires balance equivalent: ${Math.floor(total * 10)} pts</p>
                                        </div>
                                    </div>
                                    <i class="fas fa-chevron-right text-slate-600 group-hover:text-slate-400 transition"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            //------------------------------------------------------------------------
            // VISUAL DYNAMIC MODAL DRAWER FRAME: RETAIL RECEIPT PREVIEW ARTIFACTS
            //------------------------------------------------------------------------
            templateReceiptModal() {
                if (!this.lastTransaction) return ``;
                return `
                    <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto">
                        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 w-full max-w-sm shadow-2xl space-y-4">
                            <h3 class="text-center font-bold text-xs text-slate-500 uppercase tracking-widest"><i class="fas fa-circle-check text-emerald-500 mr-1"></i> Transaction Ledger Committed</h3>
                            
                            <div class="bg-white text-slate-950 p-6 rounded-xl font-mono text-xs shadow-inner space-y-4 select-text">
                                <div class="text-center border-b border-dashed border-slate-300 pb-3">
                                    <h4 class="font-black text-sm uppercase tracking-tight">${this.globalSettings.storeName}</h4>
                                    <p class="text-[10px] text-slate-500 mt-0.5">Terminal Node ID: ${this.lastTransaction.id}</p>
                                    <p class="text-[10px] text-slate-500">${new Date(this.lastTransaction.timestamp).toLocaleString()}</p>
                                </div>

                                <div class="space-y-1 text-[11px]">
                                    <p><strong>Operator Token:</strong> ${this.lastTransaction.employeeName}</p>
                                    <p><strong>CRM Consumer Anchor:</strong> ${this.lastTransaction.customerName}</p>
                                    <p><strong>Routing Gateway:</strong> ${this.lastTransaction.paymentMethod}</p>
                                </div>

                                <div class="border-b border-t border-dashed border-slate-300 py-2 my-2 space-y-2">
                                    ${this.lastTransaction.items.map(i => `
                                        <div class="flex justify-between items-start">
                                            <div class="max-w-[180px]">
                                                <p class="font-bold truncate">${i.name}</p>
                                                <p class="text-[10px] text-slate-500">Qty ${i.quantity} @ ${this.globalSettings.currencySymbol}${i.price.toFixed(2)}</p>
                                                ${i.discount > 0 ? `<p class="text-[10px] text-rose-600 font-bold">-Markdown: ${this.globalSettings.currencySymbol}${i.discount.toFixed(2)}</p>` : ''}
                                            </div>
                                            <span class="font-bold">${this.globalSettings.currencySymbol}${((i.price * i.quantity) - i.discount).toFixed(2)}</span>
                                        </div>
                                    `).join('')}
                                </div>

                                <div class="space-y-1 text-right text-[11px] font-bold">
                                    <div class="flex justify-between"><span>SUBTOTAL FLUSH:</span><span>${this.globalSettings.currencySymbol}${this.lastTransaction.subtotal.toFixed(2)}</span></div>
                                    <div class="flex justify-between"><span>TAX INGESTION ARTIFACT:</span><span>${this.globalSettings.currencySymbol}${this.lastTransaction.tax.toFixed(2)}</span></div>
                                    <div class="flex justify-between text-sm font-black border-t border-slate-200 pt-1 mt-1"><span>TOTAL CAPTURED:</span><span>${this.globalSettings.currencySymbol}${this.lastTransaction.total.toFixed(2)}</span></div>
                                </div>

                                <div class="text-center border-t border-dashed border-slate-300 pt-3 mt-4 text-[10px] text-slate-500 font-sans font-medium leading-relaxed">
                                    <p>${this.globalSettings.receiptFooter}</p>
                                    <p class="mt-1 text-[9px] font-mono uppercase tracking-wider">Aegis OS Cryptographic Signature Verified</p>
                                </div>
                            </div>

                            <button onclick="state.receiptModalOpen=false; state.render();" class="w-full py-3 bg-slate-800 hover:bg-slate-700 text-white font-bold text-xs rounded-xl transition uppercase tracking-wider">Dismiss Terminal Workspace Panel</button>
                        </div>
                    </div>
                `;
            }
        }

        // Boot and bind initial application runtime instance
        const state = new StateMachine();
        state.render();

        // Establish core ticks for synchronous interface rendering pipelines
        setInterval(() => state.updateLiveClock(), 30000);
    </script>
</body>
</html>
