<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>POS Terminal</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pro POS">

    <style>
        :root {
            --bg-dark: #09090b;
            --surface-dark: #18181b;
            --surface-card: #27272a;
            --border-dark: #27272a;
            --text-light: #f4f4f5;
            --text-dim: #a1a1aa;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
        }

        /* Full Screen Register Keypad Overlay */
        #auth-gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .keypad-container {
            background: var(--surface-dark);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border-dark);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .keypad-container h2 {
            font-size: 1.4rem;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .keypad-container p {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* The hidden dots indicator */
        .pin-dots {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            height: 20px;
            align-items: center;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: #3f3f46;
            transition: background-color 0.1s;
        }

        .dot.active {
            background-color: var(--accent-blue);
            box-shadow: 0 0 8px var(--accent-blue);
        }

        /* Touch Button Grid */
        .grid-keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .key-btn {
            background-color: var(--surface-card);
            border: 1px solid var(--border-dark);
            color: var(--text-light);
            border-radius: 16px;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.05s, transform 0.05s;
        }

        .key-btn:active {
            background-color: #3f3f46;
            transform: scale(0.95);
        }

        .key-btn.action-clear { color: var(--accent-red); font-size: 1.1rem; }
        .key-btn.action-enter { color: var(--accent-green); font-size: 1.1rem; }

        /* App Layout (Hidden by default) */
        #app-workspace {
            display: none; 
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        header {
            background-color: var(--surface-dark);
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-dark);
        }

        header h1 { font-size: 1.3rem; font-weight: 700; }

        .metrics-pill {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent-blue);
            background: #1e3a8a;
            padding: 8px 16px;
            border-radius: 20px;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            flex: 1;
            overflow: hidden;
        }

        .products-section {
            padding: 24px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .product-card {
            background-color: var(--surface-dark);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border-dark);
            cursor: pointer;
            transition: transform 0.08s, background-color 0.08s;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card:active {
            transform: scale(0.95);
            background-color: var(--surface-card);
        }

        .product-name { font-weight: 600; font-size: 1rem; }
        .product-price { color: var(--accent-blue); font-weight: 700; font-size: 1.15rem; }

        .cart-sidebar {
            background-color: var(--surface-dark);
            border-left: 1px solid var(--border-dark);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .cart-header {
            padding: 20px 24px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-dark);
        }

        .clear-btn { background: none; border: none; color: var(--accent-red); font-weight: 600; cursor: pointer; }
        .cart-items-list { flex: 1; overflow-y: auto; padding: 10px 24px; }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-dark);
        }

        .item-details h4 { font-size: 1rem; font-weight: 600; }
        .item-details p { font-size: 0.85rem; color: var(--text-dim); }
        .item-price-final { font-weight: 700; }

        .cart-checkout-footer {
            padding: 24px;
            background-color: var(--bg-dark);
            border-top: 1px solid var(--border-dark);
        }

        .ledger-line { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .ledger-line.total-bold {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            font-size: 1.4rem;
            font-weight: 800;
            border-top: 1px solid var(--border-dark);
            padding-top: 16px;
            margin-bottom: 20px;
        }

        .charge-button {
            width: 100%;
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="keypad-container">
            <h2>Terminal Locked</h2>
            <p>Enter Station PIN Code</p>
            
            <div class="pin-dots">
                <div class="dot" id="dot-0"></div>
                <div class="dot" id="dot-1"></div>
                <div class="dot" id="dot-2"></div>
                <div class="dot" id="dot-3"></div>
                <div class="dot" id="dot-4"></div>
                <div class="dot" id="dot-5"></div>
                <div class="dot" id="dot-6"></div>
            </div>

            <div class="grid-keypad">
                <div class="key-btn" onclick="pressNum('1')">1</div>
                <div class="grid-keypad"></div>
                <div class="key-btn" onclick="pressNum('2')">2</div>
                <div class="key-btn" onclick="pressNum('3')">3</div>
                
                <div class="key-btn" onclick="pressNum('4')">4</div>
                <div class="key-btn" onclick="pressNum('5')">5</div>
                <div class="key-btn" onclick="pressNum('6')">6</div>
                
                <div class="key-btn" onclick="pressNum('7')">7</div>
                <div class="key-btn" onclick="pressNum('8')">8</div>
                <div class="key-btn" onclick="pressNum('9')">9</div>
                
                <div class="key-btn action-clear" onclick="pressClear()">Clear</div>
                <div class="key-btn" onclick="pressNum('0')">0</div>
                <div class="key-btn action-enter" onclick="pressEnter()">Enter</div>
            </div>
        </div>
    </div>

    <div id="app-workspace">
        <header>
            <h1>Register Terminal 01</h1>
            <div class="metrics-pill" id="live-sales-tracker">Today's Sales: $0.00</div>
        </header>

        <div class="app-container">
            <section class="products-section">
                <div class="products-grid" id="catalog-hook"></div>
            </section>

            <aside class="cart-sidebar">
                <div class="cart-header">
                    <span>Current Order</span>
                    <button class="clear-btn" onclick="clearActiveOrder()">Clear All</button>
                </div>
                <div class="cart-items-list" id="cart-hook"></div>
                <div class="cart-checkout-footer">
                    <div class="ledger-line"><span>Subtotal</span><span id="calc-subtotal">$0.00</span></div>
                    <div class="ledger-line"><span>Estimated Tax (7%)</span><span id="calc-tax">$0.00</span></div>
                    <div class="ledger-line total-bold"><span>Total</span><span id="calc-total">$0.00</span></div>
                    <button class="charge-button" onclick="checkoutOrder()">Charge &amp; Complete</button>
                </div>
            </aside>
        </div>
    </div>

    <script>
        // Secret code target
        const ACCESS_SECRET = "9091237"; 
        let currentPinInput = "";

        function pressNum(num) {
            if (currentPinInput.length >= 7) return; // Matches the max 7 characters
            currentPinInput += num;
            updateDots();
        }

        function pressClear() {
            currentPinInput = "";
            updateDots();
        }

        function pressEnter() {
            if (currentPinInput === ACCESS_SECRET) {
                // Instantly remove lockscreen and trigger layout
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('app-workspace').style.display = 'flex';
                startupPOS();
            } else {
                // Visual shake/reset on bad entry
                alert("Invalid terminal access authorization.");
                pressClear();
            }
        }

        function updateDots() {
            for (let i = 0; i < 7; i++) {
                const dotElement = document.getElementById(`dot-${i}`);
                if (i < currentPinInput.length) {
                    dotElement.classList.add('active');
                } else {
                    dotElement.classList.remove('active');
                }
            }
        }

        const productCatalog = [
            { id: 1, name: "Premium Tier Box", price: 45.00 },
            { id: 2, name: "Standard Option A", price: 25.00 },
            { id: 3, name: "Standard Option B", price: 15.00 },
            { id: 4, name: "Add-On Upgrade", price: 10.00 },
            { id: 5, name: "Essential Pack", price: 30.00 },
            { id: 6, name: "Custom Setup Svc", price: 65.00 },
            { id: 7, name: "Mini Gift Item", price: 5.50 },
            { id: 8, name: "Deluxe Bundle Kit", price: 85.00 }
        ];

        let activeCart = [];
        let runningSalesTotal = parseFloat(localStorage.getItem('pos_running_sales')) || 0;

        function startupPOS() {
            const gridContainer = document.getElementById('catalog-hook');
            gridContainer.innerHTML = '';
            
            productCatalog.forEach(item => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => addItemToOrder(item.id);
                card.innerHTML = `
                    <div class="product-name">${item.name}</div>
                    <div class="product-price">$${item.price.toFixed(2)}</div>
                `;
                gridContainer.appendChild(card);
            });
            refreshHistoricalDisplay();
        }

        function addItemToOrder(itemId) {
            const catalogItem = productCatalog.find(p => p.id === itemId);
            const matchesInCart = activeCart.find(cartItem => cartItem.id === itemId);
            if (matchesInCart) { matchesInCart.quantity += 1; } 
            else { activeCart.push({ ...catalogItem, quantity: 1 }); }
            refreshCartUI();
        }

        function clearActiveOrder() { activeCart = []; refreshCartUI(); }

        function refreshCartUI() {
            const listContainer = document.getElementById('cart-hook');
            listContainer.innerHTML = '';
            let structuralSubtotal = 0;

            activeCart.forEach(item => {
                const rowCost = item.price * item.quantity;
                structuralSubtotal += rowCost;
                const rowElement = document.createElement('div');
                rowElement.className = 'cart-item-row';
                rowElement.innerHTML = `
                    <div class="item-details">
                        <h4>${item.name}</h4>
                        <p>$${item.price.toFixed(2)} x ${item.quantity}</p>
                    </div>
                    <div class="item-price-final">$${rowCost.toFixed(2)}</div>
                `;
                listContainer.appendChild(rowElement);
            });

            const calculatedTax = structuralSubtotal * 0.07;
            const finalCalculatedTotal = structuralSubtotal + calculatedTax;

            document.getElementById('calc-subtotal').innerText = `$${structuralSubtotal.toFixed(2)}`;
            document.getElementById('calc-tax').innerText = `$${calculatedTax.toFixed(2)}`;
            document.getElementById('calc-total').innerText = `$${finalCalculatedTotal.toFixed(2)}`;
        }

        function checkoutOrder() {
            if (activeCart.length === 0) return;
            const activeTotalString = document.getElementById('calc-total').innerText;
            const absoluteTotalNumeric = parseFloat(activeTotalString.replace('$', ''));

            runningSalesTotal += absoluteTotalNumeric;
            localStorage.setItem('pos_running_sales', runningSalesTotal.toString());

            alert(`Sale Finalized Successfully!\nProcessed Charge Amount: ${activeTotalString}`);
            clearActiveOrder();
            refreshHistoricalDisplay();
        }

        function refreshHistoricalDisplay() {
            document.getElementById('live-sales-tracker').innerText = `Today's Sales: $${runningSalesTotal.toFixed(2)}`;
        }
    </script>
</body>
</html>
